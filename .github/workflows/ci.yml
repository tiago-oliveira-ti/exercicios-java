
name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Compilar exercícios
      run: |
        javac -d bin src/ex01_tabuada/Tabuada.java
        javac -d bin src/ex02_imc/IMC.java
        javac -d bin src/ex03_pares_impares/ParesImpares.java
        javac -d bin src/ex04_divisibilidade/Divisibilidade.java
